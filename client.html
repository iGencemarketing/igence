<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iGence — Minha Página</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#F5A623;--dark:#0A0A0A;--dark2:#111;--dark3:#1A1A1A;--white:#fff;--green:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0d;color:var(--white);font-family:'Montserrat',sans-serif;min-height:100vh;}
#loginScreen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;}
.login-box{background:var(--dark2);border:1px solid #222;border-radius:12px;padding:44px 36px;width:360px;text-align:center;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);letter-spacing:3px;margin-bottom:2px;}
.login-logo span{color:var(--white);}
.login-sub{font-size:11px;color:#555;margin-bottom:24px;letter-spacing:1px;}
.login-input{width:100%;background:#1a1a1a;border:1px solid #333;color:#fff;padding:12px 16px;border-radius:6px;font-size:14px;font-family:'Montserrat',sans-serif;outline:none;margin-bottom:12px;transition:border .2s;}
.login-input:focus{border-color:var(--gold);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--gold),#e8940a);color:#000;border:none;padding:14px;border-radius:6px;font-weight:900;font-size:15px;cursor:pointer;letter-spacing:1px;}
.login-hint{font-size:11px;color:#444;margin-top:12px;}
.login-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:12px;padding:10px;border-radius:6px;margin-top:10px;display:none;}
#app{display:none;}
header{background:var(--dark2);border-bottom:1px solid #1a1a1a;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;}
.h-logo span{color:#fff;}
.h-right{display:flex;align-items:center;gap:12px;}
.h-empresa{font-size:13px;font-weight:700;color:#ccc;}
.h-plan{font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;}
.h-plan.basico{background:rgba(156,163,175,0.1);color:#9ca3af;border:1px solid rgba(156,163,175,0.2);}
.h-plan.pro{background:rgba(245,166,35,0.1);color:var(--gold);border:1px solid rgba(245,166,35,0.2);}
.h-plan.elite{background:rgba(168,85,247,0.1);color:#a855f7;border:1px solid rgba(168,85,247,0.2);}
.logout-btn{background:transparent;border:1px solid #333;color:#666;padding:7px 14px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;}
.main-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 57px);}
@media(max-width:900px){.main-wrap{grid-template-columns:1fr;}}
.panel-left{padding:28px;border-right:1px solid #1a1a1a;overflow-y:auto;max-height:calc(100vh - 57px);}
.panel-section{margin-bottom:28px;}
.ps-title{font-size:11px;font-weight:800;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #1a1a1a;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg label{font-size:11px;font-weight:700;color:#666;letter-spacing:1px;}
.fg input,.fg select,.fg textarea{background:#141414;border:1px solid #2a2a2a;color:#fff;padding:11px 14px;border-radius:6px;font-size:13px;font-family:'Montserrat',sans-serif;outline:none;transition:border .2s;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg textarea{resize:vertical;min-height:70px;}
.fg select option{background:#1a1a1a;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.c-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;}
.c-opt.active{border-color:#fff;transform:scale(1.2);}
.lock-overlay{background:rgba(0,0,0,0.7);border-radius:8px;padding:20px;text-align:center;}
.lock-icon{font-size:32px;margin-bottom:8px;}
.lock-text{font-size:13px;color:#888;margin-bottom:12px;}
.upgrade-btn{background:linear-gradient(135deg,var(--gold),#e8940a);color:#000;border:none;padding:10px 20px;border-radius:4px;font-weight:900;font-size:12px;cursor:pointer;letter-spacing:1px;}
.panel-right{background:#141414;display:flex;flex-direction:column;position:relative;}
.preview-header{padding:14px 20px;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;background:var(--dark2);}
.preview-title{font-size:12px;font-weight:800;color:#888;letter-spacing:1px;}
.device-btns{display:flex;gap:6px;}
.dev-btn{background:#1a1a1a;border:1px solid #2a2a2a;color:#666;padding:5px 12px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.dev-btn.active,.dev-btn:hover{border-color:var(--gold);color:var(--gold);}
.preview-wrap{flex:1;overflow-y:auto;padding:20px;display:flex;justify-content:center;}
.preview-container{transition:width .3s;}
.preview-container.desktop{width:100%;}
.preview-container.tablet{width:768px;max-width:100%;}
.preview-container.mobile{width:375px;max-width:100%;}
.preview-site{border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.save-bar{padding:16px 20px;border-top:1px solid #1a1a1a;background:var(--dark2);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.save-btn{background:linear-gradient(135deg,var(--gold),#e8940a);color:#000;border:none;padding:12px 28px;border-radius:6px;font-weight:900;font-size:13px;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.page-url{font-size:12px;color:#4ade80;font-family:monospace;}
.notif{position:fixed;bottom:24px;right:24px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px 20px;font-size:13px;font-weight:600;z-index:9999;display:none;}
.notif.success{border-color:rgba(34,197,94,0.4);color:var(--green);}
.notif.error{border-color:rgba(239,68,68,0.4);color:#f87171;}
.status-card{background:var(--dark3);border:1px solid #2a2a2a;border-radius:8px;padding:18px;margin-bottom:20px;}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px;}
.sc-row:last-child{border:none;}
.sc-label{color:#666;font-size:12px;}
.sc-val{font-weight:600;}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:200px;color:#555;font-size:14px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">iG<span>ence</span></div>
    <div class="login-sub">PAINEL DO CLIENTE</div>
    <input class="login-input" type="email" id="cEmail" placeholder="Seu email">
    <input class="login-input" type="password" id="cPass" placeholder="Sua senha">
    <button class="login-btn" id="loginBtn" onclick="doClientLogin()">ENTRAR NO MEU PAINEL</button>
    <p class="login-hint">Dados de acesso enviados por WhatsApp</p>
    <div class="login-error" id="loginError">Email ou senha incorretos.</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="h-logo">iG<span>ence</span></div>
    <div class="h-right">
      <span class="h-empresa" id="hEmpresa">Carregando...</span>
      <span class="h-plan" id="hPlan">—</span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </header>

  <div class="main-wrap">
    <div class="panel-left" id="panelLeft">
      <div class="loading-screen"><span class="spin"></span> Carregando seus dados...</div>
    </div>
    <div class="panel-right">
      <div class="preview-header">
        <span class="preview-title">👁 PRÉVIA AO VIVO</span>
        <div class="device-btns">
          <button class="dev-btn active" onclick="setDevice('desktop',this)">🖥 Desktop</button>
          <button class="dev-btn" onclick="setDevice('tablet',this)">📱 Tablet</button>
          <button class="dev-btn" onclick="setDevice('mobile',this)">📲 Mobile</button>
        </div>
      </div>
      <div class="preview-wrap">
        <div class="preview-container desktop" id="previewContainer">
          <div class="preview-site" id="liveSite"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
const SUPABASE_URL = 'https://cfaitsaplpbanfzzaoxr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ogk89uALXDTeTvDwY11GmQ_CTtqNLTf';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let clientData = null;
let clientId = null;

const palettes = {
  gold:{bg:'#0a0800',accent:'#F5A623',text:'#fff',card:'rgba(245,166,35,0.06)',cardBorder:'rgba(245,166,35,0.15)'},
  blue:{bg:'#00060f',accent:'#38bdf8',text:'#fff',card:'rgba(56,189,248,0.06)',cardBorder:'rgba(56,189,248,0.15)'},
  green:{bg:'#050f08',accent:'#34d399',text:'#fff',card:'rgba(52,211,153,0.06)',cardBorder:'rgba(52,211,153,0.15)'},
  red:{bg:'#0f0000',accent:'#ef4444',text:'#fff',card:'rgba(239,68,68,0.06)',cardBorder:'rgba(239,68,68,0.15)'},
  purple:{bg:'#0f0010',accent:'#e879f9',text:'#fff',card:'rgba(232,121,249,0.06)',cardBorder:'rgba(232,121,249,0.15)'},
  orange:{bg:'#0f0800',accent:'#fb923c',text:'#fff',card:'rgba(251,146,60,0.06)',cardBorder:'rgba(251,146,60,0.15)'}
};

// ===== AUTH =====
async function doClientLogin(){
  const email=document.getElementById('cEmail').value.trim();
  const pass=document.getElementById('cPass').value;
  const errEl=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';
  if(!email||!pass){errEl.textContent='Preencha email e senha.';errEl.style.display='block';return;}
  btn.innerHTML='<span class="spin"></span>Entrando...';btn.disabled=true;

  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  btn.innerHTML='ENTRAR NO MEU PAINEL';btn.disabled=false;

  if(error){errEl.textContent='Email ou senha incorretos.';errEl.style.display='block';return;}

  await loadClientData(data.user);
}

document.getElementById('cPass').addEventListener('keyup',e=>{if(e.key==='Enter')doClientLogin();});

async function logout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  clientData=null;clientId=null;
}

window.addEventListener('load',async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session) await loadClientData(session.user);
});

// ===== LOAD DATA =====
async function loadClientData(user){
  // Busca o registro do cliente pela user_id
  const {data,error}=await sb.from('clients').select('*').eq('user_id',user.id).single();

  if(error||!data){
    // Tenta pelo email
    const {data:d2,error:e2}=await sb.from('clients').select('*').eq('email',user.email).single();
    if(e2||!d2){
      showNotif('Nenhum cliente encontrado para este login. Contate o administrador.','error');
      await sb.auth.signOut();
      return;
    }
    clientData=d2;
  } else {
    clientData=data;
  }

  clientId=clientData.id;

  // Garante arrays
  if(!Array.isArray(clientData.services)) clientData.services=[];
  if(!Array.isArray(clientData.photos)) clientData.photos=[];

  // Monta a UI
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('hEmpresa').textContent=clientData.empresa;
  const planEl=document.getElementById('hPlan');
  planEl.textContent={basico:'Básico',pro:'Profissional',elite:'Elite'}[clientData.plano]||clientData.plano;
  planEl.className='h-plan '+clientData.plano;

  renderPanel();
  updatePreview();
}

// ===== RENDER PANEL =====
function renderPanel(){
  const d=clientData;
  const isBasico=d.plano==='basico';
  const isElite=d.plano==='elite';

  const expDate=new Date();expDate.setDate(expDate.getDate()+30);
  const daysLeft=30;

  document.getElementById('panelLeft').innerHTML=`
    <!-- STATUS -->
    <div class="panel-section">
      <div class="ps-title">📊 Status da Minha Página</div>
      <div class="status-card">
        <div class="sc-row"><span class="sc-label">Status</span><span style="color:#4ade80;font-weight:700;">✓ Online</span></div>
        <div class="sc-row"><span class="sc-label">Domínio</span><span class="sc-val" style="color:#4ade80;font-family:monospace;font-size:12px;">${d.page_url||'—'}</span></div>
        <div class="sc-row"><span class="sc-label">Plano</span><span class="sc-val">${{basico:'Básico — R$47,90/mês',pro:'Profissional — R$97/mês',elite:'Elite — R$197/mês'}[d.plano]}</span></div>
        <div class="sc-row"><span class="sc-label">Criada em</span><span class="sc-val">${d.date||'—'}</span></div>
        <div class="sc-row"><span class="sc-label">Renovação</span><span class="sc-val" style="color:#4ade80;">${daysLeft} dias restantes</span></div>
        <div class="sc-row" style="border:none;padding-top:12px;">
          <a href="${d.page_url||'#'}" target="_blank" style="color:#4ade80;font-size:12px;font-family:monospace;text-decoration:none;">Abrir minha página ↗</a>
        </div>
      </div>
    </div>

    ${!isBasico?`
    <!-- DOMÍNIO -->
    <div class="panel-section">
      <div class="ps-title">🌐 Meu Domínio</div>
      <div class="status-card" style="margin-bottom:14px;">
        <div class="sc-row"><span class="sc-label">Domínio atual</span><span class="sc-val" style="color:#4ade80;font-family:monospace;font-size:12px;">${d.page_url||'—'}</span></div>
        <div class="sc-row" style="border:none;"><span class="sc-label">SSL</span><span style="color:#4ade80;font-weight:700;font-size:12px;">🔒 Ativo</span></div>
      </div>
      <div class="fg">
        <label>Solicitar troca de domínio</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="newDomainInput" placeholder="meunegocio.com.br" style="flex:1;">
          <button onclick="requestDomain()" style="background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--gold);padding:0 16px;border-radius:6px;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif;">SOLICITAR</button>
        </div>
        <div style="font-size:11px;color:#555;margin-top:4px;">Nossa equipe configurará em até 24h</div>
      </div>
    </div>`:''}

    <!-- ASSINATURA -->
    <div class="panel-section">
      <div class="ps-title">💳 Assinatura</div>
      <div class="status-card">
        <div class="sc-row"><span class="sc-label">Próxima cobrança</span><span class="sc-val">${expDate.toLocaleDateString('pt-BR')}</span></div>
        <div class="sc-row"><span class="sc-label">Valor</span><span class="sc-val">${{basico:'R$ 47,90/mês',pro:'R$ 97,00/mês',elite:'R$ 197,00/mês'}[d.plano]}</span></div>
        <div class="sc-row" style="border:none;"><span class="sc-label">Método</span><span class="sc-val">💳 Cartão / PIX</span></div>
      </div>
      <button onclick="openRenew()" style="width:100%;background:transparent;border:1px solid #333;color:#888;padding:10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Montserrat',sans-serif;transition:all .2s;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='#333';this.style.color='#888'">🔄 Gerenciar Assinatura</button>
    </div>

    ${isBasico?`
    <!-- BÁSICO: edição limitada -->
    <div class="panel-section">
      <div class="ps-title">✏️ Informações de Contato</div>
      <div class="fg"><label>WhatsApp</label><input type="text" id="e_whats" value="${d.whats||''}" oninput="updatePreview()"></div>
      <div class="fg"><label>Horário de Atendimento</label><input type="text" id="e_horario" value="${d.horario||''}" placeholder="Seg a Sex, 8h às 18h" oninput="updatePreview()"></div>
    </div>
    <div class="lock-overlay">
      <div class="lock-icon">🔒</div>
      <div class="lock-text">Edição completa disponível no plano <b style="color:var(--gold)">Profissional</b> ou superior</div>
      <button class="upgrade-btn" onclick="showUpgrade()">FAZER UPGRADE → R$97/mês</button>
    </div>`:`

    <!-- PRO/ELITE: edição completa -->
    <div class="panel-section">
      <div class="ps-title">🏢 Informações da Empresa</div>
      <div class="fg"><label>Nome da Empresa *</label><input type="text" id="e_empresa" value="${d.empresa||''}" oninput="updatePreview()"></div>
      <div class="fg"><label>WhatsApp *</label><input type="text" id="e_whats2" value="${d.whats||''}" oninput="updatePreview()"></div>
      <div class="fg"><label>Slogan</label><input type="text" id="e_slogan" value="${d.slogan||''}" placeholder="Ex: Seus direitos, nossa missão" oninput="updatePreview()"></div>
      <div class="fg"><label>Headline Principal</label><input type="text" id="e_headline" value="${d.headline||''}" placeholder="Ex: DEFENDEMOS SEUS DIREITOS" oninput="updatePreview()"></div>
      <div class="fg"><label>Texto de apresentação</label><textarea id="e_desc" oninput="updatePreview()">${d.descricao||''}</textarea></div>
    </div>

    <div class="panel-section">
      <div class="ps-title">📋 Seus Serviços</div>
      <div id="servicesInputs"></div>
      <button onclick="addService()" style="background:transparent;border:1px dashed #333;color:#666;padding:8px 16px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700;width:100%;margin-top:4px;">+ Adicionar Serviço</button>
    </div>

    <div class="panel-section">
      <div class="ps-title">📊 Números de Destaque</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="fg"><label>Número 1</label><input type="text" id="stat1n" value="${d.stat1n||'500+'}" oninput="updatePreview()"></div>
        <div class="fg"><label>Label 1</label><input type="text" id="stat1l" value="${d.stat1l||'Clientes'}" oninput="updatePreview()"></div>
        <div class="fg"><label>Número 2</label><input type="text" id="stat2n" value="${d.stat2n||'10'}" oninput="updatePreview()"></div>
        <div class="fg"><label>Label 2</label><input type="text" id="stat2l" value="${d.stat2l||'Anos Exp.'}" oninput="updatePreview()"></div>
        <div class="fg"><label>Número 3</label><input type="text" id="stat3n" value="${d.stat3n||'98%'}" oninput="updatePreview()"></div>
        <div class="fg"><label>Label 3</label><input type="text" id="stat3l" value="${d.stat3l||'Satisfação'}" oninput="updatePreview()"></div>
      </div>
    </div>

    <div class="panel-section">
      <div class="ps-title">💬 Depoimento em Destaque</div>
      <div class="fg"><label>Texto</label><textarea id="e_testi" oninput="updatePreview()">${d.testi||''}</textarea></div>
      <div class="fg"><label>Autor</label><input type="text" id="e_testi_autor" value="${d.testi_autor||''}" placeholder="— Maria S., cliente" oninput="updatePreview()"></div>
    </div>

    <div class="panel-section">
      <div class="ps-title">🎨 Paleta de Cores</div>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div class="panel-section">
      <div class="ps-title">📞 Botão de Ação (CTA)</div>
      <div class="fg"><label>Texto do Botão</label><input type="text" id="e_cta" value="${d.cta||'Entrar em Contato'}" oninput="updatePreview()"></div>
      <div class="fg"><label>Urgência (opcional)</label><input type="text" id="e_urgency" value="${d.urgency||''}" placeholder="Ex: Últimas vagas esta semana!" oninput="updatePreview()"></div>
    </div>

    ${isElite?`
    <div class="panel-section">
      <div class="ps-title">⭐ Elite — SEO & Analytics</div>
      <div class="fg"><label>Palavras-chave SEO</label><input type="text" id="e_seo" value="${d.seo||''}" placeholder="advogado trabalhista são paulo" oninput="updatePreview()"></div>
      <div class="fg"><label>Pixel Meta/Facebook</label><input type="text" id="e_pixel" value="${d.pixel||''}" placeholder="Seu ID do Pixel"></div>
      <div class="fg"><label>Google Analytics (GA4)</label><input type="text" id="e_ga" value="${d.ga||''}" placeholder="G-XXXXXXXXXX"></div>
    </div>`:''}
    `}

    <div class="save-bar">
      <div>
        <div style="font-size:11px;color:#555;margin-bottom:3px;">Alterações salvas no banco de dados</div>
        <div class="page-url">${d.page_url||'—'}</div>
      </div>
      <button class="save-btn" onclick="saveChanges()">💾 SALVAR ALTERAÇÕES</button>
    </div>
  `;

  if(!isBasico){
    buildServices();
    buildColorPicker();
  }
}

// ===== SERVICES =====
function buildServices(){
  const container=document.getElementById('servicesInputs');
  if(!container)return;
  const services=clientData.services||[];
  container.innerHTML=services.map((s,i)=>`
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <input type="text" value="${s}" oninput="updateServiceItem(${i},this.value)" style="flex:1;background:#141414;border:1px solid #2a2a2a;color:#fff;padding:10px 12px;border-radius:6px;font-size:12px;font-family:'Montserrat',sans-serif;outline:none;">
      <button onclick="removeService(${i})" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#666;padding:8px 12px;border-radius:6px;cursor:pointer;">✕</button>
    </div>`).join('');
}

function updateServiceItem(i,v){
  if(!clientData.services)clientData.services=[];
  clientData.services[i]=v;updatePreview();
}
function addService(){
  if(!clientData.services)clientData.services=[];
  clientData.services.push('Novo Serviço');buildServices();updatePreview();
}
function removeService(i){
  clientData.services.splice(i,1);buildServices();updatePreview();
}

// ===== COLOR PICKER =====
function buildColorPicker(){
  const row=document.getElementById('colorRow');if(!row)return;
  const cols={gold:'linear-gradient(135deg,#F5A623,#e8940a)',blue:'linear-gradient(135deg,#38bdf8,#0284c7)',green:'linear-gradient(135deg,#34d399,#059669)',red:'linear-gradient(135deg,#ef4444,#dc2626)',purple:'linear-gradient(135deg,#e879f9,#9333ea)',orange:'linear-gradient(135deg,#fb923c,#ea580c)'};
  row.innerHTML=Object.entries(cols).map(([k,v])=>`<div class="c-opt ${clientData.cores===k?'active':''}" style="background:${v};" title="${k}" onclick="selectColor('${k}',this)"></div>`).join('');
}
function selectColor(key,el){
  document.querySelectorAll('.c-opt').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');clientData.cores=key;updatePreview();
}

// ===== READ FORM =====
function readForm(){
  if(!clientData)return;
  if(clientData.plano==='basico'){
    const w=document.getElementById('e_whats');
    const h=document.getElementById('e_horario');
    if(w)clientData.whats=w.value;
    if(h)clientData.horario=h.value;
  } else {
    const get=id=>{const el=document.getElementById(id);return el?el.value:null;};
    if(get('e_empresa'))clientData.empresa=get('e_empresa');
    if(get('e_whats2'))clientData.whats=get('e_whats2');
    clientData.slogan=get('e_slogan')||clientData.slogan;
    clientData.headline=get('e_headline')||clientData.headline;
    clientData.descricao=get('e_desc')||clientData.descricao;
    clientData.stat1n=get('stat1n')||clientData.stat1n;
    clientData.stat1l=get('stat1l')||clientData.stat1l;
    clientData.stat2n=get('stat2n')||clientData.stat2n;
    clientData.stat2l=get('stat2l')||clientData.stat2l;
    clientData.stat3n=get('stat3n')||clientData.stat3n;
    clientData.stat3l=get('stat3l')||clientData.stat3l;
    clientData.testi=get('e_testi')||clientData.testi;
    clientData.testi_autor=get('e_testi_autor')||clientData.testi_autor;
    clientData.cta=get('e_cta')||clientData.cta;
    clientData.urgency=get('e_urgency');
    if(get('e_seo'))clientData.seo=get('e_seo');
    if(get('e_pixel'))clientData.pixel=get('e_pixel');
    if(get('e_ga'))clientData.ga=get('e_ga');
  }
}

// ===== SAVE TO SUPABASE =====
async function saveChanges(){
  readForm();
  if(!clientId){showNotif('Erro: cliente não identificado','error');return;}

  const updates={
    empresa:clientData.empresa,whats:clientData.whats,
    slogan:clientData.slogan,headline:clientData.headline,
    descricao:clientData.descricao,services:clientData.services||[],
    stat1n:clientData.stat1n,stat1l:clientData.stat1l,
    stat2n:clientData.stat2n,stat2l:clientData.stat2l,
    stat3n:clientData.stat3n,stat3l:clientData.stat3l,
    testi:clientData.testi,testi_autor:clientData.testi_autor,
    cta:clientData.cta,urgency:clientData.urgency,
    cores:clientData.cores,horario:clientData.horario,
    seo:clientData.seo,pixel:clientData.pixel,ga:clientData.ga,
    photos:clientData.photos||[],photo_type:clientData.photo_type,
    updated_at:new Date().toISOString()
  };

  const {error}=await sb.from('clients').update(updates).eq('id',clientId);
  if(error){showNotif('Erro ao salvar: '+error.message,'error');return;}
  showNotif('✅ Alterações salvas com sucesso!');
}

        ${nh.sub?`<div style="font-size:11px;color:${p.accent};letter-spacing:2px;font-weight:700;margin-bottom:10px;">${nh.sub}</div>`:''}

// ===== DEVICE =====
function setDevice(d,el){
  document.querySelectorAll('.dev-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('previewContainer').className='preview-container '+d;
}

// ===== HELPERS =====
function showUpgrade(){
  alert('Para fazer upgrade para o plano Profissional (R$97/mês), entre em contato via WhatsApp com nossa equipe!');
}
function requestDomain(){
  const val=document.getElementById('newDomainInput')?.value?.trim();
  if(!val){showNotif('Digite um domínio!');return;}
  const msg=encodeURIComponent('Olá! Gostaria de solicitar a troca do meu domínio para: '+val+'. Minha empresa: '+clientData.empresa);
  window.open('https://wa.me/5519974038092?text='+msg,'_blank');
  showNotif('✅ Solicitação enviada via WhatsApp!');
}
function openRenew(){
  const msg=encodeURIComponent('Olá! Gostaria de gerenciar minha assinatura iGence. Minha empresa: '+(clientData?.empresa||''));
  window.open('https://wa.me/5519974038092?text='+msg,'_blank');
}
function showNotif(msg,type='success'){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className='notif '+type;el.style.display='block';
  setTimeout(()=>el.style.display='none',3500);
}
